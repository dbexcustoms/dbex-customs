<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — DBEX Customs</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-pattern">
<header><div class="wrap nav">
<a class="logo" href="index.html">DBEX<span class="sub">CUSTOMS</span></a>
<nav class="links"><a href="login.html">Уже есть аккаунт? Войти</a></nav>
</div></header>
<main><div class="wrap">
<div class="card form-narrow" style="margin:0 auto;">
<h1 style="font-size:24px;">Регистрация</h1>
<p class="muted" style="margin-bottom:24px;">Создайте аккаунт, чтобы подавать заявки и загружать документы.</p>
<div id="errorMsg" class="error-msg"></div>
<form id="registerForm">
<div class="field"><label>Имя и фамилия</label><input type="text" id="full_name" required maxlength="255"></div>
<div class="field"><label>Компания (опционально)</label><input type="text" id="company_name" maxlength="255"></div>
<div class="field"><label>Телефон (опционально)</label><input type="tel" id="phone" maxlength="64"></div>
<div class="field"><label>Email</label><input type="email" id="email" required></div>
<div class="field"><label>Пароль (минимум 8 символов)</label><input type="password" id="password" required minlength="8"></div>
<button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Создать аккаунт</button>
</form>
</div>
</div></main>
<footer><div class="wrap">© 2026 DBEX Customs</div></footer>
<script>window.DBEX_API_BASE = "https://dbex-customs-backend.onrender.com/api";</script>
<script src="js/api.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
 e.preventDefault();
 const errorEl = document.getElementById('errorMsg');
 errorEl.style.display = 'none';
 const submitBtn = document.getElementById('submitBtn');
 submitBtn.disabled = true; submitBtn.textContent = 'Создаём аккаунт…';
 try {
   const payload = {
     full_name: document.getElementById('full_name').value.trim(),
     company_name: document.getElementById('company_name').value.trim(),
     phone: document.getElementById('phone').value.trim(),
     email: document.getElementById('email').value.trim(),
     password: document.getElementById('password').value,
   };
   const data = await api('/auth/register', { method: 'POST', body: payload });
   setToken(data.token); setUser(data.user);
   window.location.href = 'dashboard.html';
 } catch (err) {
   errorEl.textContent = err.message;
   errorEl.style.display = 'block';
 } finally {
   submitBtn.disabled = false; submitBtn.textContent = 'Создать аккаунт';
 }
});
</script>
</body>
</html>
